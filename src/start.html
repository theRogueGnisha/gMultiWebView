<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Start</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 300;
      margin-bottom: 2rem;
      color: #888;
    }
    .search-box {
      width: 100%;
      max-width: 560px;
      margin-bottom: 2.5rem;
    }
    .search-box input {
      width: 100%;
      padding: 14px 20px;
      font-size: 1rem;
      border: 1px solid #333;
      border-radius: 24px;
      background: #2d2d2d;
      color: #e0e0e0;
      outline: none;
    }
    .search-box input::placeholder { color: #666; }
    .search-box input:focus {
      border-color: #4a9eff;
      box-shadow: 0 0 0 2px rgba(74, 158, 255, 0.2);
    }
    .links {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .link-card {
      display: block;
      padding: 1.25rem 2rem;
      background: #2d2d2d;
      border: 1px solid #333;
      border-radius: 12px;
      color: #e0e0e0;
      text-decoration: none;
      font-size: 1.1rem;
      transition: background 0.2s, border-color 0.2s;
    }
    .link-card:hover {
      background: #383838;
      border-color: #4a9eff;
    }
    .link-card.youtube { border-left: 4px solid #ff0000; }
    .link-card.twitch { border-left: 4px solid #9146ff; }
  </style>
</head>
<body>
  <h1>Quick start</h1>
  <form class="search-box" action="https://www.google.com/search" method="get" target="_self">
    <input type="text" name="q" placeholder="Search Google…" autofocus>
  </form>
  <div class="links">
    <a class="link-card youtube" href="https://www.youtube.com" target="_self">YouTube</a>
    <a class="link-card twitch" href="https://www.twitch.tv" target="_self">Twitch</a>
  </div>
</body>
</html>
